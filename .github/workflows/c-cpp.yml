name: CSPICE_CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install build tools
      run: sudo apt-get update && sudo apt-get install -y build-essential flex bison

    - name: Prepare directories
      run: mkdir -p obj bin

    - name: Build
      run: make

    - name: Run tests
      run: make check || echo "No check target defined"

    - name: Distcheck
      run: make distcheck || echo "No distcheck target defined"
